name: Sync Dependency Version

on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: 'Package version to propagate'
        required: true
        type: string
      PACKAGE_NAMES:
        description: 'Comma-separated list of package names'
        required: true
        type: string

permissions: {}

jobs:
  sync:
    uses: VY-GEN032-KG/genexus-dependency-sync/.github/workflows/commit-to-git.yml@master
    with:
      COMPONENT_NAME: ${{ github.repository }}
      BRANCH: ${{ github.ref_name }}
      VERSION: ${{ inputs.VERSION }}
      PACKAGE_NAMES: ${{ inputs.PACKAGE_NAMES }}
    secrets:
      GENEXUS_LINK_PRIVATE_KEY: ${{ secrets.GENEXUS_LINK_PRIVATE_KEY }}
